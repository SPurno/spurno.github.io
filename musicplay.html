<body>
    <!-- SPurno Animation Studio watermark: keep this creator mark with the music player. -->
    <div class="music-control">
        <h1 class="music-title">Background Music Player</h1>
        <p class="music-note">Watermarked preview player. Music loads only after the play button is pressed.</p>
        <button id="musicButton" onclick="toggleMusic()">Play Music</button>
        <br />
        <label for="volumeControl">Volume:</label>
        <input type="range" id="volumeControl" class="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="adjustVolume(this.value)" />
    </div>

    <audio id="backgroundMusic" loop preload="none" controlsList="nodownload noplaybackrate" data-watermark="SPurno Animation Studio">
        Your browser does not support the audio element.
    </audio>

    <script>
        const backgroundMusic = document.getElementById("backgroundMusic");
        const musicButton = document.getElementById("musicButton");
        const volumeControl = document.getElementById("volumeControl");
        const protectedMusicPath = ["music", "EmotionalPiano.mp3"].join("/");
        let isPlaying = false;
        let musicLoaded = false;

        // Set initial volume
        backgroundMusic.volume = 0.5;
        backgroundMusic.addEventListener("contextmenu", function(event) {
            event.preventDefault();
        });

        function loadMusicPreview() {
            if (musicLoaded) return;
            backgroundMusic.src = protectedMusicPath;
            backgroundMusic.load();
            musicLoaded = true;
        }

        // Toggle music play/pause
        function toggleMusic() {
            if (isPlaying) {
                backgroundMusic.pause();
                musicButton.textContent = "Play Music";
            } else {
                loadMusicPreview();
                backgroundMusic.play().then(function() {
                    musicButton.textContent = "Pause Music";
                }).catch(function() {
                    musicButton.textContent = "Play Music";
                    isPlaying = false;
                });
            }
            isPlaying = !isPlaying;
        }

        // Adjust volume
        function adjustVolume(volume) {
            backgroundMusic.volume = volume;
        }
    </script>
