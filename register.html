<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account | SPurno Animation Studio</title>
    <meta name="description" content="Create your SPurno Animation Studio account to save favorites and access exclusive content.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://spurno.github.io/register">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="stylesheet" href="assets/css/register.css">
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="auth-logo">
            <img src="images/spurno-logo.png" alt="SPurno Animation Studio">
            <span>SPurno</span>
        </a>

        <div class="auth-card">
            <h1 class="auth-title">Create <span>Account</span></h1>
            <p class="auth-subtitle">Join SPurno to save favorites and access exclusive content.</p>

            <!-- Alerts -->
            <div class="alert" id="alertMessage" role="alert"></div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="name">Full Name (optional)</label>
                    <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    <div class="field-error" id="emailError">Please enter a valid email address.</div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
                    <div class="password-strength" id="passwordStrength">
                        <div class="bar" data-index="0"></div>
                        <div class="bar" data-index="1"></div>
                        <div class="bar" data-index="2"></div>
                        <div class="bar" data-index="3"></div>
                    </div>
                    <div class="field-error" id="passwordError">Password must be at least 6 characters.</div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" required autocomplete="new-password">
                    <div class="field-error" id="confirmError">Passwords do not match.</div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>

        <div class="auth-footer" style="margin-top: 20px;">
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script src="js/auth-client.js"></script>
    <script>
        (function() {
            const form = document.getElementById('registerForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            const nameInput = document.getElementById('name');
            const submitBtn = document.getElementById('submitBtn');
            const alertEl = document.getElementById('alertMessage');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const confirmError = document.getElementById('confirmError');
            const strengthBars = document.querySelectorAll('#passwordStrength .bar');

            // If already logged in, redirect
            if (AuthClient.isAuthenticated()) {
                window.location.href = '/';
                return;
            }

            // Password strength indicator
            passwordInput.addEventListener('input', function() {
                const val = this.value;
                let score = 0;
                if (val.length >= 6) score++;
                if (val.length >= 10) score++;
                if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
                if (/\d/.test(val) || /[^A-Za-z0-9]/.test(val)) score++;

                strengthBars.forEach((bar, i) => {
                    bar.classList.toggle('active', i < score);
                    bar.className = 'bar' + (i < score ? ' active' : '') + (score <= 1 ? ' weak' : score <= 2 ? ' medium' : ' strong');
                });
            });

            // Real-time confirm password check
            confirmInput.addEventListener('input', function() {
                if (this.value && this.value !== passwordInput.value) {
                    confirmError.classList.add('visible');
                } else {
                    confirmError.classList.remove('visible');
                }
            });

            function showAlert(message, type) {
                alertEl.textContent = message;
                alertEl.className = 'alert ' + type;
            }

            function setLoading(loading) {
                submitBtn.disabled = loading;
                submitBtn.classList.toggle('loading', loading);
            }

            function clearErrors() {
                [emailInput, passwordInput, confirmInput].forEach(el => el.classList.remove('error'));
                [emailError, passwordError, confirmError].forEach(el => el.classList.remove('visible'));
            }

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                clearErrors();
                showAlert('', '');
                let valid = true;

                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirm = confirmInput.value;
                const name = nameInput.value.trim();

                // Validate email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    emailInput.classList.add('error');
                    emailError.classList.add('visible');
                    valid = false;
                }

                // Validate password
                if (password.length < 6) {
                    passwordInput.classList.add('error');
                    passwordError.classList.add('visible');
                    valid = false;
                }

                // Validate confirmation
                if (password !== confirm) {
                    confirmInput.classList.add('error');
                    confirmError.classList.add('visible');
                    valid = false;
                }

                if (!valid) return;

                setLoading(true);

                try {
                    await AuthClient.register(email, password, name || undefined);
                    showAlert('Account created successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1200);
                } catch (error) {
                    showAlert(error.message || 'Registration failed. Please try again.', 'error');
                    setLoading(false);
                }
            });
        })();
    </script>
</body>
</html>
