<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account | SPurno Animation Studio</title>
    <meta name="description" content="Create your SPurno Animation Studio account to save favorites and access exclusive content.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <style>
        :root {
            --color-primary: #22d3ee;
            --color-primary-dark: #04b5d0;
            --color-accent: #a855f7;
            --color-bg: #0a0a0f;
            --color-primary-rgb: 34, 211, 238;
            --color-accent-rgb: 168, 85, 247;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Jost', sans-serif;
            color: #fff;
            background: var(--color-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Animated background gradient */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 20%, rgba(34, 211, 238, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 80%, rgba(168, 85, 247, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
        }

        /* Logo */
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            text-decoration: none;
        }
        .auth-logo img {
            height: 40px;
            width: auto;
            border-radius: 8px;
        }
        .auth-logo span {
            font-weight: 700;
            font-size: 1.15rem;
            color: #fff;
            letter-spacing: 0.3px;
        }

        /* Card */
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .auth-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .auth-title span {
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.92rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 14px;
            color: #fff;
            font-family: 'Jost', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        .form-group input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(var(--color-primary-rgb), 0.12);
        }
        .form-group input.error {
            border-color: #ef4444;
        }
        .form-group .field-error {
            display: none;
            color: #ef4444;
            font-size: 0.78rem;
            margin-top: 6px;
        }
        .form-group .field-error.visible {
            display: block;
        }

        /* Password strength */
        .password-strength {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .password-strength .bar {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.08);
            transition: background 0.3s ease;
        }
        .password-strength .bar.active.weak { background: #ef4444; }
        .password-strength .bar.active.medium { background: #f59e0b; }
        .password-strength .bar.active.strong { background: #22c55e; }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-family: 'Jost', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            color: #fff;
            box-shadow: 0 4px 24px rgba(var(--color-accent-rgb), 0.35);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }
        .btn-submit:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 32px rgba(var(--color-accent-rgb), 0.5);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-submit .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }
        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .spinner { display: block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Alert */
        .alert {
            display: none;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .alert.error {
            display: block;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        .alert.success {
            display: block;
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        /* Footer links */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.88rem;
        }
        .auth-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .auth-footer a:hover {
            color: #fff;
        }

        /* Back to home */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 24px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--color-primary);
        }

        @media (max-width: 480px) {
            .auth-card { padding: 28px 20px; }
            .auth-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="auth-logo">
            <img src="images/spurno-logo.png" alt="SPurno Animation Studio">
            <span>SPurno</span>
        </a>

        <div class="auth-card">
            <h1 class="auth-title">Create <span>Account</span></h1>
            <p class="auth-subtitle">Join SPurno to save favorites and access exclusive content.</p>

            <!-- Alerts -->
            <div class="alert" id="alertMessage" role="alert"></div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="name">Full Name (optional)</label>
                    <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    <div class="field-error" id="emailError">Please enter a valid email address.</div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
                    <div class="password-strength" id="passwordStrength">
                        <div class="bar" data-index="0"></div>
                        <div class="bar" data-index="1"></div>
                        <div class="bar" data-index="2"></div>
                        <div class="bar" data-index="3"></div>
                    </div>
                    <div class="field-error" id="passwordError">Password must be at least 6 characters.</div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" required autocomplete="new-password">
                    <div class="field-error" id="confirmError">Passwords do not match.</div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>

        <div class="auth-footer" style="margin-top: 20px;">
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script src="js/auth-client.js"></script>
    <script>
        (function() {
            const form = document.getElementById('registerForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            const nameInput = document.getElementById('name');
            const submitBtn = document.getElementById('submitBtn');
            const alertEl = document.getElementById('alertMessage');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const confirmError = document.getElementById('confirmError');
            const strengthBars = document.querySelectorAll('#passwordStrength .bar');

            // If already logged in, redirect
            if (AuthClient.isAuthenticated()) {
                window.location.href = '/';
                return;
            }

            // Password strength indicator
            passwordInput.addEventListener('input', function() {
                const val = this.value;
                let score = 0;
                if (val.length >= 6) score++;
                if (val.length >= 10) score++;
                if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
                if (/\d/.test(val) || /[^A-Za-z0-9]/.test(val)) score++;

                strengthBars.forEach((bar, i) => {
                    bar.classList.toggle('active', i < score);
                    bar.className = 'bar' + (i < score ? ' active' : '') + (score <= 1 ? ' weak' : score <= 2 ? ' medium' : ' strong');
                });
            });

            // Real-time confirm password check
            confirmInput.addEventListener('input', function() {
                if (this.value && this.value !== passwordInput.value) {
                    confirmError.classList.add('visible');
                } else {
                    confirmError.classList.remove('visible');
                }
            });

            function showAlert(message, type) {
                alertEl.textContent = message;
                alertEl.className = 'alert ' + type;
            }

            function setLoading(loading) {
                submitBtn.disabled = loading;
                submitBtn.classList.toggle('loading', loading);
            }

            function clearErrors() {
                [emailInput, passwordInput, confirmInput].forEach(el => el.classList.remove('error'));
                [emailError, passwordError, confirmError].forEach(el => el.classList.remove('visible'));
            }

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                clearErrors();
                showAlert('', '');
                let valid = true;

                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirm = confirmInput.value;
                const name = nameInput.value.trim();

                // Validate email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    emailInput.classList.add('error');
                    emailError.classList.add('visible');
                    valid = false;
                }

                // Validate password
                if (password.length < 6) {
                    passwordInput.classList.add('error');
                    passwordError.classList.add('visible');
                    valid = false;
                }

                // Validate confirmation
                if (password !== confirm) {
                    confirmInput.classList.add('error');
                    confirmError.classList.add('visible');
                    valid = false;
                }

                if (!valid) return;

                setLoading(true);

                try {
                    await AuthClient.register(email, password, name || undefined);
                    showAlert('Account created successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1200);
                } catch (error) {
                    showAlert(error.message || 'Registration failed. Please try again.', 'error');
                    setLoading(false);
                }
            });
        })();
    </script>
</body>
</html>
