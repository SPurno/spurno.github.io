<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
  <title id="title">SPurno video thumbnail fallback</title>
  <desc id="desc">Abstract motion graphics thumbnail with a play symbol.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#143a52"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f7931e"/>
      <stop offset="0.52" stop-color="#23c6d3"/>
      <stop offset="1" stop-color="#e64a7a"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="320" height="180" rx="10" fill="url(#bg)"/>
  <path d="M0 132 C46 98 78 106 126 76 C176 45 219 48 320 20 V180 H0 Z" fill="#0d2537" opacity="0.82"/>
  <path d="M-24 145 C35 112 80 126 135 92 C196 55 238 58 345 28" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
  <path d="M-18 115 C43 83 93 92 146 61 C197 31 244 28 334 7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.24"/>
  <g opacity="0.72">
    <rect x="24" y="24" width="58" height="6" rx="3" fill="#fff" opacity="0.7"/>
    <rect x="24" y="40" width="94" height="4" rx="2" fill="#fff" opacity="0.35"/>
    <rect x="24" y="51" width="74" height="4" rx="2" fill="#fff" opacity="0.24"/>
  </g>
  <g filter="url(#soft-shadow)">
    <circle cx="160" cy="90" r="36" fill="#fff" opacity="0.92"/>
    <path d="M150 70 L186 90 L150 110 Z" fill="#111827"/>
  </g>
  <g fill="#fff" opacity="0.42">
    <circle cx="262" cy="130" r="3"/>
    <circle cx="281" cy="130" r="3"/>
    <circle cx="300" cy="130" r="3"/>
  </g>
  <rect x="0.5" y="0.5" width="319" height="179" rx="9.5" fill="none" stroke="#fff" stroke-opacity="0.16"/>
