<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In | SPurno Animation Studio</title>
    <meta name="description" content="Sign in to your SPurno Animation Studio account.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://spurno.github.io/login">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="auth-logo">
            <img src="images/spurno-logo.png" alt="SPurno Animation Studio">
            <span>SPurno</span>
        </a>

        <div class="auth-card">
            <h1 class="auth-title">Welcome <span>Back</span></h1>
            <p class="auth-subtitle">Sign in to your SPurno account.</p>

            <!-- Alerts -->
            <div class="alert" id="alertMessage" role="alert"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    <div class="field-error" id="emailError">Please enter a valid email address.</div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    <div class="field-error" id="passwordError">Please enter your password.</div>
                    <div style="text-align:right;margin-top:6px;">
                        <a href="forgot-password.html" class="forgot-link" aria-label="Reset your password">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Create one</a>
            </div>
        </div>

        <div class="auth-footer" style="margin-top: 20px;">
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script src="js/auth-client.js"></script>
    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submitBtn');
            const alertEl = document.getElementById('alertMessage');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');

            // If already logged in, redirect
            if (AuthClient.isAuthenticated()) {
                window.location.href = '/';
                return;
            }

            function showAlert(message, type) {
                alertEl.textContent = message;
                alertEl.className = 'alert ' + type;
            }

            function setLoading(loading) {
                submitBtn.disabled = loading;
                submitBtn.classList.toggle('loading', loading);
            }

            function clearErrors() {
                [emailInput, passwordInput].forEach(el => el.classList.remove('error'));
                [emailError, passwordError].forEach(el => el.classList.remove('visible'));
            }

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                clearErrors();
                showAlert('', '');
                let valid = true;

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Validate email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    emailInput.classList.add('error');
                    emailError.classList.add('visible');
                    valid = false;
                }

                // Validate password
                if (!password) {
                    passwordInput.classList.add('error');
                    passwordError.classList.add('visible');
                    valid = false;
                }

                if (!valid) return;

                setLoading(true);

                try {
                    await AuthClient.login(email, password);
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1200);
                } catch (error) {
                    showAlert(error.message || 'Login failed. Please try again.', 'error');
                    setLoading(false);
                }
            });
        })();
    </script>
</body>
</html>
