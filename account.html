<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Dashboard | SPurno Animation Studio</title>
    <meta name="description" content="Manage your SPurno account — view favorites, download history, and settings.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://spurno.github.io/account">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="stylesheet" href="assets/css/account.css">
</head>
<body>
<div class="dashboard-wrap">

    <!-- Top Bar -->
    <div class="dash-top">
        <a href="index.html" class="dash-logo">
            <img src="images/spurno-logo.png" alt="SPurno">
            <span>SPurno Dashboard</span>
        </a>
        <div class="dash-top-right">
            <a href="index.html" style="color:rgba(255,255,255,0.5);font-size:0.82rem;text-decoration:none;">← Home</a>
            <button class="dash-signout" onclick="if(confirm('Sign out?'))AuthClient.logout();">Sign Out</button>
        </div>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-nav" id="tabNav">
        <button class="tab-btn active" data-tab="profile">👤 Profile</button>
        <button class="tab-btn" data-tab="favorites">⭐ Favorites <span class="tab-badge" id="favCount">0</span></button>
        <button class="tab-btn" data-tab="downloads">📥 Downloads <span class="tab-badge" id="dlCount">0</span></button>
        <button class="tab-btn" data-tab="settings">⚙️ Settings</button>
        <button class="tab-btn" data-tab="orders">📋 Orders</button>
    </div>

    <!-- Alert -->
    <div class="alert" id="alertMessage" role="alert"></div>

    <!-- ===== Profile Tab ===== -->
    <div class="tab-panel active" id="panel-profile">
        <div class="dash-card">
            <div id="profileContent">
                <div class="profile-header">
                    <div class="profile-avatar" id="avatarLetter">S</div>
                    <h1 class="profile-name" id="userName">—</h1>
                    <p class="profile-email" id="userEmail">—</p>
                </div>
                <div class="profile-meta">
                    <div class="row"><span class="label">Member Since</span><span class="value" id="userSince">—</span></div>
                    <div class="row"><span class="label">User ID</span><span class="value" id="userId">—</span></div>
                    <div class="row"><span class="label">Favorites</span><span class="value" id="statFavs">0</span></div>
                    <div class="row"><span class="label">Downloads</span><span class="value" id="statDls">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== Favorites Tab ===== -->
    <div class="tab-panel" id="panel-favorites">
        <div class="dash-card">
            <h2 class="dash-card-title">⭐ My Favorites</h2>
            <div id="favContent"><div class="loading-spinner" style="margin:24px auto;display:block;"></div></div>
        </div>
    </div>

    <!-- ===== Downloads Tab ===== -->
    <div class="tab-panel" id="panel-downloads">
        <div class="dash-card">
            <h2 class="dash-card-title">📥 Download History</h2>
            <div id="dlContent"><div class="loading-spinner" style="margin:24px auto;display:block;"></div></div>
        </div>
    </div>

    <!-- ===== Orders Tab ===== -->
    <div class="tab-panel" id="panel-orders">
        <div class="dash-card">
            <h2 class="dash-card-title">📋 My Quote Requests</h2>
            <div class="alert" id="orderAlert" role="alert"></div>

            <!-- Order form (shown when not viewing details) -->
            <div id="orderFormWrap">
                <form class="order-form" id="orderForm">
                    <div class="form-row">
                        <label for="orderType">Animation Type *</label>
                        <select id="orderType" required>
                            <option value="">Select animation type...</option>
                            <option value="2d-animation">2D Animation</option>
                            <option value="3d-animation">3D Animation</option>
                            <option value="motion-graphics">Motion Graphics</option>
                            <option value="infographic">Infographic</option>
                            <option value="typography">Typography</option>
                            <option value="explainer">Explainer Video</option>
                            <option value="whiteboard">Whiteboard Animation</option>
                            <option value="logo-animation">Logo Animation</option>
                            <option value="character-animation">Character Animation</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label for="orderDuration">Duration (seconds)</label>
                        <input type="number" id="orderDuration" min="1" max="300" placeholder="e.g. 30">
                    </div>
                    <div class="form-row">
                        <label for="orderDescription">Project Description *</label>
                        <textarea id="orderDescription" rows="4" placeholder="Describe your animation project in detail — what you need, your vision, target audience, etc." required></textarea>
                    </div>
                    <div class="form-row">
                        <label for="orderStyle">Style / Vibe</label>
                        <input type="text" id="orderStyle" placeholder="e.g. Minimalist, Cartoon, Realistic, Dark, Vibrant...">
                    </div>
                    <div class="form-row">
                        <label for="orderLinks">Reference Links</label>
                        <input type="text" id="orderLinks" placeholder="Links to examples, moodboards, or references">
                    </div>
                    <div class="form-row">
                        <label for="orderBudget">Budget Range</label>
                        <input type="text" id="orderBudget" placeholder="e.g. $200 - $500">
                    </div>
                    <div class="form-row">
                        <label for="orderDeadline">Deadline</label>
                        <input type="text" id="orderDeadline" placeholder="e.g. 2 weeks, December 2024">
                    </div>
                    <div class="form-row">
                        <label for="orderPayment">Payment Method</label>
                        <select id="orderPayment">
                            <option value="">Select payment method...</option>
                            <option value="payoneer">Payoneer</option>
                            <option value="skrill">Skrill</option>
                            <option value="bkash">bKash</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label for="orderNotes">Additional Notes</label>
                        <textarea id="orderNotes" rows="3" placeholder="Any other information, special requests, or questions"></textarea>
                    </div>
                    <button type="submit" class="btn-save" id="orderSubmitBtn">Submit Quote Request</button>
                </form>
            </div>

            <!-- Orders list (shown after submitting or loading existing orders) -->
            <div id="orderListWrap" style="display:none;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h3 style="margin:0;font-size:1rem;">Your Requests</h3>
                    <button class="btn-save" id="newOrderBtn" style="padding:6px 16px;font-size:0.82rem;">+ New Request</button>
                </div>
                <div id="orderListContent"><div class="loading-spinner" style="margin:24px auto;display:block;"></div></div>
            </div>
        </div>
    </div>

    <!-- ===== Settings Tab ===== -->
    <div class="tab-panel" id="panel-settings">
        <div class="dash-card">
            <h2 class="dash-card-title">⚙️ Account Settings</h2>
            <div class="alert" id="settingsAlert" role="alert"></div>
            <form class="settings-form" id="settingsForm">
                <div class="settings-section">
                    <h3>Profile</h3>
                    <div class="form-row">
                        <label for="settingsName">Display Name</label>
                        <input type="text" id="settingsName" placeholder="Your name" autocomplete="name">
                    </div>
                </div>
                <div class="settings-section">
                    <h3>Change Password</h3>
                    <div class="form-row">
                        <label for="settingsCurPw">Current Password</label>
                        <input type="password" id="settingsCurPw" placeholder="Enter current password" autocomplete="current-password">
                    </div>
                    <div class="form-row">
                        <label for="settingsNewPw">New Password (min 6 characters)</label>
                        <input type="password" id="settingsNewPw" placeholder="Enter new password" autocomplete="new-password">
                    </div>
                    <div class="form-row">
                        <label for="settingsConfirmPw">Confirm New Password</label>
                        <input type="password" id="settingsConfirmPw" placeholder="Confirm new password" autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="btn-save" id="settingsBtn">Save Changes</button>
            </form>
        </div>
    </div>

</div>

<script src="js/auth-client.js"></script>
<script>
(function() {
    // ── State ──────────────────────────────────────────
    let user = null;
    let favorites = [];
    let downloads = [];

    // ── DOM refs ───────────────────────────────────────
    const $ = id => document.getElementById(id);
    const alertEl = $('alertMessage');

    const nameEl = $('userName'), emailEl = $('userEmail');
    const avatarEl = $('avatarLetter'), sinceEl = $('userSince'), idEl = $('userId');
    const statFavs = $('statFavs'), statDls = $('statDls');
    const favCount = $('favCount'), dlCount = $('dlCount');
    const favContent = $('favContent'), dlContent = $('dlContent');

    const settingsName = $('settingsName');
    const settingsCurPw = $('settingsCurPw'), settingsNewPw = $('settingsNewPw'), settingsConfirmPw = $('settingsConfirmPw');
    const settingsBtn = $('settingsBtn'), settingsAlert = $('settingsAlert');
    const settingsForm = $('settingsForm');

    // ── Auth check ─────────────────────────────────────
    if (!AuthClient.isAuthenticated()) {
        alertEl.textContent = 'You are not signed in. Redirecting...';
        alertEl.className = 'alert error';
        setTimeout(() => window.location.href = '/login.html', 2000);
        return;
    }

    // ── Tab switching ──────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            $(`panel-${btn.dataset.tab}`).classList.add('active');
        });
    });

    // ── Load data ──────────────────────────────────────
    async function loadDashboard() {
        try {
            // Load user
            const localUser = AuthClient.getUser();
            if (localUser) renderUser(localUser);

            const meData = await AuthClient.getMe();
            if (meData) {
                user = meData;
                renderUser(meData);
            }

            // Load favorites
            try {
                const favData = await AuthClient.getFavorites();
                favorites = favData.favorites || [];
                renderFavorites();
            } catch {}

            // Load downloads
            try {
                const dlData = await AuthClient.getDownloads();
                downloads = dlData.downloads || [];
                renderDownloads();
            } catch {}

            // Load orders
            loadOrders();

            // Load settings
            if (user) settingsName.value = user.name || '';
        } catch {
            alertEl.textContent = 'Session expired. Please sign in again.';
            alertEl.className = 'alert error';
            setTimeout(() => AuthClient.logout(), 2000);
        }
    }

    function renderUser(u) {
        const displayName = u.name || u.email.split('@')[0];
        nameEl.textContent = displayName;
        emailEl.textContent = u.email;
        avatarEl.textContent = displayName[0].toUpperCase();
        idEl.textContent = '#' + u.id;
        if (u.created_at) {
            sinceEl.textContent = new Date(u.created_at).toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric'
            });
        }
        statFavs.textContent = favorites.length;
        statDls.textContent = downloads.length;
    }

    function renderFavorites() {
        favCount.textContent = favorites.length;
        statFavs.textContent = favorites.length;

        if (!favorites.length) {
            favContent.innerHTML = `<div class="items-empty"><div class="icon">⭐</div><p>No favorites yet. Browse our videos and save your favorites!</p></div>`;
            return;
        }

        favContent.innerHTML = `<div class="items-grid">${favorites.map(f => `
            <div class="item-card">
                <button class="item-remove" onclick="removeFav('${f.item_id}')" title="Remove">✕</button>
                <div class="thumb">${f.thumbnail ? `<img src="${f.thumbnail}" alt="${f.title}" loading="lazy">` : getTypeIcon(f.item_type)}</div>
                <div class="item-title">${f.title || 'Untitled'}</div>
                <div class="item-meta">${formatDate(f.created_at)}</div>
            </div>
        `).join('')}</div>`;
    }

    function renderDownloads() {
        dlCount.textContent = downloads.length;
        statDls.textContent = downloads.length;

        if (!downloads.length) {
            dlContent.innerHTML = `<div class="items-empty"><div class="icon">📥</div><p>No download history yet. Your downloaded items will appear here.</p></div>`;
            return;
        }

        dlContent.innerHTML = `<div class="items-grid">${downloads.map(d => `
            <div class="item-card">
                <div class="thumb">${getTypeIcon(d.item_type)}</div>
                <div class="item-title">${d.title || 'Untitled'}</div>
                <div class="item-meta">${d.platform} · ${formatDate(d.created_at)}</div>
            </div>
        `).join('')}</div>`;
    }

    function getTypeIcon(type) {
        const icons = { video: '🎬', infographic: '📊', mockup: '📱', typography: '✏️', motion: '✨' };
        return icons[type] || '📁';
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── Remove favorite ────────────────────────────────
    window.removeFav = async function(itemId) {
        try {
            await AuthClient.removeFavorite(itemId);
            favorites = favorites.filter(f => f.item_id !== itemId);
            renderFavorites();
        } catch (e) {
            alertEl.textContent = e.message || 'Failed to remove';
            alertEl.className = 'alert error';
        }
    };

    // ── Orders ─────────────────────────────────────────
    let orders = [];
    const orderFormWrap = $('orderFormWrap');
    const orderListWrap = $('orderListWrap');
    const orderListContent = $('orderListContent');
    const orderAlert = $('orderAlert');
    const orderForm = $('orderForm');
    const orderSubmitBtn = $('orderSubmitBtn');
    const newOrderBtn = $('newOrderBtn');

    function showOrderAlert(msg, type) {
        orderAlert.textContent = msg;
        orderAlert.className = 'alert ' + type;
        setTimeout(() => { orderAlert.className = 'alert'; }, 5000);
    }

    async function loadOrders() {
        try {
            const data = await AuthClient.getOrders();
            orders = data.orders || [];
            renderOrders();
        } catch {
            orders = [];
            renderOrders();
        }
    }

    function renderOrders() {
        if (!orders.length) {
            orderListContent.innerHTML = `<div class="items-empty"><div class="icon">📋</div><p>No quote requests yet. Submit your first animation project request above!</p></div>`;
            return;
        }

        const statusLabels = {
            pending: '⏳ Pending',
            quoted: '💰 Quoted',
            accepted: '✅ Accepted',
            in_progress: '⚡ In Progress',
            completed: '🎉 Completed',
            cancelled: '❌ Cancelled',
        };

        orderListContent.innerHTML = `<div class="orders-list">${orders.map(o => `
            <div class="order-card">
                <div class="order-header">
                    <span class="order-number">${o.order_number}</span>
                    <span class="order-status status-${o.status}">${statusLabels[o.status] || o.status}</span>
                </div>
                <div class="order-type">${o.animation_type.replace('-', ' ').replace(/\b\w/g, c => c.toUpperCase())}</div>
                <div class="order-desc">${o.description.length > 120 ? o.description.slice(0, 120) + '...' : o.description}</div>
                <div class="order-meta">
                    ${o.duration_seconds ? o.duration_seconds + 's' : ''}
                    ${o.budget_range ? ' · ' + o.budget_range : ''}
                    ${o.deadline ? ' · Due: ' + o.deadline : ''}
                    ${o.payment_method ? ' · ' + o.payment_method : ''}
                </div>
                ${o.admin_response ? `<div class="order-response"><strong>Reply:</strong> ${o.admin_response}</div>` : ''}
                ${o.quoted_price ? `<div class="order-price">Quoted: ${o.quoted_price}</div>` : ''}
                <div class="order-date">Submitted ${formatDate(o.created_at)}</div>
            </div>
        `).join('')}</div>`;
    }

    // Toggle between form and list
    function showOrderForm(show) {
        orderFormWrap.style.display = show ? 'block' : 'none';
        orderListWrap.style.display = show ? 'none' : 'block';
    }

    newOrderBtn.addEventListener('click', () => showOrderForm(true));

    orderForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const animationType = $('orderType').value;
        const duration = $('orderDuration').value;
        const description = $('orderDescription').value.trim();
        const styleVibe = $('orderStyle').value.trim();
        const links = $('orderLinks').value.trim();
        const budget = $('orderBudget').value.trim();
        const deadline = $('orderDeadline').value.trim();
        const payment = $('orderPayment').value;
        const notes = $('orderNotes').value.trim();

        if (!animationType || !description) {
            showOrderAlert('Please fill in Animation Type and Description.', 'error');
            return;
        }

        orderSubmitBtn.disabled = true;
        orderSubmitBtn.textContent = 'Submitting...';

        try {
            const result = await AuthClient.createOrder({
                animation_type: animationType,
                duration_seconds: duration ? parseInt(duration, 10) : null,
                description,
                style_vibe: styleVibe,
                reference_links: links,
                budget_range: budget,
                deadline,
                payment_method: payment,
                additional_notes: notes,
            });

            showOrderAlert(result.message || 'Quote request submitted!', 'success');

            // Reset form
            orderForm.reset();

            // Reload orders and switch to list
            await loadOrders();
            showOrderForm(false);
        } catch (e) {
            showOrderAlert(e.message || 'Failed to submit. Please try again.', 'error');
        }

        orderSubmitBtn.disabled = false;
        orderSubmitBtn.textContent = 'Submit Quote Request';
    });

    // ── Settings form ──────────────────────────────────
    settingsForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        settingsAlert.className = 'alert';
        settingsAlert.textContent = '';

        const name = settingsName.value.trim();
        const curPw = settingsCurPw.value;
        const newPw = settingsNewPw.value;
        const confirmPw = settingsConfirmPw.value;

        // Validate passwords
        if (newPw && newPw.length < 6) {
            settingsAlert.textContent = 'New password must be at least 6 characters.';
            settingsAlert.className = 'alert error';
            return;
        }
        if (newPw && newPw !== confirmPw) {
            settingsAlert.textContent = 'Passwords do not match.';
            settingsAlert.className = 'alert error';
            return;
        }

        settingsBtn.disabled = true;
        settingsBtn.textContent = 'Saving...';

        try {
            const body = {};
            if (name) body.name = name;
            if (curPw && newPw) { body.current_password = curPw; body.new_password = newPw; }

            const result = await AuthClient.updateAccount(body);
            settingsAlert.textContent = result.message || 'Settings saved!';
            settingsAlert.className = 'alert success';
            settingsCurPw.value = ''; settingsNewPw.value = ''; settingsConfirmPw.value = '';

            // Update stored user
            if (result.user) {
                AuthClient.setUser(result.user);
                user = result.user;
                renderUser(result.user);
            }
        } catch (e) {
            settingsAlert.textContent = e.message || 'Failed to save settings.';
            settingsAlert.className = 'alert error';
        }

        settingsBtn.disabled = false;
        settingsBtn.textContent = 'Save Changes';
    });

    // ── Start ──────────────────────────────────────────
    loadDashboard();
})();
</script>
</body>
</html>
