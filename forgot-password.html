<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password | SPurno Animation Studio</title>
    <meta name="description" content="Reset your SPurno account password.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://spurno.github.io/forgot-password">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="stylesheet" href="assets/css/forgot-password.css">
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="auth-logo">
            <img src="images/spurno-logo.png" alt="SPurno Animation Studio" width="3893" height="1099" loading="lazy" title="SPurno Animation Studio - Reset Password">
            <span>SPurno</span>
        </a>
        <div class="auth-card">
            <h1 class="auth-title">Reset <span>Password</span></h1>
            <p class="auth-subtitle">Enter your email to receive a password reset link.</p>
            <div class="alert" id="alertMessage" role="alert"></div>
            <div class="reset-link-box" id="resetLinkBox">
                <div class="label">🔗 Reset Link (demo mode)</div>
                <a href="#" id="resetLink" target="_blank"></a>
                <div class="hint">In production, this link would be sent to your email.</div>
            </div>
            <form id="forgotForm" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Send Reset Link</span>
                    <span class="spinner"></span>
                </button>
            </form>
            <div class="auth-footer">
                Remember your password? <a href="login.html">Sign In</a>
            </div>
        </div>
        <div class="auth-footer" style="margin-top: 20px;">
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>
    <script src="js/auth-client.js"></script>
    <script>
        (function() {
            const form = document.getElementById('forgotForm');
            const emailInput = document.getElementById('email');
            const submitBtn = document.getElementById('submitBtn');
            const alertEl = document.getElementById('alertMessage');
            const resetLinkBox = document.getElementById('resetLinkBox');
            const resetLink = document.getElementById('resetLink');

            if (AuthClient.isAuthenticated()) { window.location.href = '/'; return; }

            function showAlert(msg, type) { alertEl.textContent = msg; alertEl.className = 'alert ' + type; }
            function setLoading(l) { submitBtn.disabled = l; submitBtn.classList.toggle('loading', l); }

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                showAlert('', '');
                resetLinkBox.classList.remove('visible');
                const email = emailInput.value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showAlert('Please enter a valid email address.', 'error');
                    return;
                }
                setLoading(true);
                try {
                    const data = await AuthClient.forgotPassword(email);
                    showAlert(data.message || 'Check your email for the reset link.', 'success');
                    // In demo mode, show the reset link directly
                    if (data._debug_reset_link) {
                        resetLink.href = data._debug_reset_link;
                        resetLink.textContent = data._debug_reset_link;
                        resetLinkBox.classList.add('visible');
                    }
                } catch (err) {
                    showAlert(err.message || 'Something went wrong.', 'error');
                }
                setLoading(false);
            });
        })();
    </script>
</body>
</html>
