<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password | SPurno Animation Studio</title>
    <meta name="description" content="Reset your SPurno account password.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://spurno.github.io/forgot-password">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <style>
        :root { --color-primary: #22d3ee; --color-primary-dark: #04b5d0; --color-accent: #a855f7; --color-bg: #0a0a0f; --color-primary-rgb: 34, 211, 238; --color-accent-rgb: 168, 85, 247; }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Jost', sans-serif; color: #fff; background: var(--color-bg);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 24px;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(34,211,238,0.07) 0%, transparent 60%),
                        radial-gradient(ellipse 60% 80% at 50% 70%, rgba(168,85,247,0.05) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        .auth-container { position: relative; z-index: 1; width: 100%; max-width: 440px; }
        .auth-logo {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-bottom: 32px; text-decoration: none;
        }
        .auth-logo img { height: 40px; border-radius: 8px; }
        .auth-logo span { font-weight: 700; font-size: 1.15rem; color: #fff; letter-spacing: 0.3px; }
        .auth-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border: 1px solid rgba(255,255,255,0.10); border-radius: 24px; padding: 40px 36px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .auth-title { text-align: center; font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
        .auth-title span { background: linear-gradient(135deg, var(--color-primary), var(--color-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .auth-subtitle { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.92rem; margin-bottom: 32px; line-height: 1.6; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 500; color: rgba(255,255,255,0.7); margin-bottom: 8px; letter-spacing: 0.3px; }
        .form-group input {
            width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10); border-radius: 14px; color: #fff;
            font-family: 'Jost', sans-serif; font-size: 0.95rem; outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.25); }
        .form-group input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(var(--color-primary-rgb),0.12); }
        .btn-submit {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-family: 'Jost', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.3px;
            cursor: pointer; background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            color: #fff; box-shadow: 0 4px 24px rgba(var(--color-accent-rgb),0.35);
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1); position: relative;
        }
        .btn-submit:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 32px rgba(var(--color-accent-rgb),0.5); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-submit .spinner { display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { display: none; padding: 14px 18px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 20px; line-height: 1.5; }
        .alert.error { display: block; background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
        .alert.success { display: block; background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
        .alert.info { display: block; background: rgba(34,211,238,0.12); border: 1px solid rgba(34,211,238,0.2); color: #67e8f9; }
        .auth-footer { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.45); font-size: 0.88rem; }
        .auth-footer a { color: var(--color-primary); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .auth-footer a:hover { color: #fff; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.85rem; margin-bottom: 24px; transition: color 0.2s; }
        .back-link:hover { color: var(--color-primary); }
        .reset-link-box {
            display: none; margin-top: 16px; padding: 14px 16px;
            background: rgba(34,211,238,0.08); border: 1px solid rgba(34,211,238,0.15);
            border-radius: 12px; font-size: 0.82rem; word-break: break-all;
        }
        .reset-link-box.visible { display: block; }
        .reset-link-box .label { color: rgba(255,255,255,0.5); margin-bottom: 6px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .reset-link-box a { color: var(--color-primary); }
        .reset-link-box .hint { color: rgba(255,255,255,0.35); font-size: 0.78rem; margin-top: 8px; }
        @media (max-width: 480px) { .auth-card { padding: 28px 20px; } .auth-title { font-size: 1.3rem; } }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="auth-logo">
            <img src="images/spurno-logo.png" alt="SPurno Animation Studio">
            <span>SPurno</span>
        </a>
        <div class="auth-card">
            <h1 class="auth-title">Reset <span>Password</span></h1>
            <p class="auth-subtitle">Enter your email to receive a password reset link.</p>
            <div class="alert" id="alertMessage" role="alert"></div>
            <div class="reset-link-box" id="resetLinkBox">
                <div class="label">🔗 Reset Link (demo mode)</div>
                <a href="#" id="resetLink" target="_blank"></a>
                <div class="hint">In production, this link would be sent to your email.</div>
            </div>
            <form id="forgotForm" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Send Reset Link</span>
                    <span class="spinner"></span>
                </button>
            </form>
            <div class="auth-footer">
                Remember your password? <a href="login.html">Sign In</a>
            </div>
        </div>
        <div class="auth-footer" style="margin-top: 20px;">
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>
    <script src="js/auth-client.js"></script>
    <script>
        (function() {
            const form = document.getElementById('forgotForm');
            const emailInput = document.getElementById('email');
            const submitBtn = document.getElementById('submitBtn');
            const alertEl = document.getElementById('alertMessage');
            const resetLinkBox = document.getElementById('resetLinkBox');
            const resetLink = document.getElementById('resetLink');

            if (AuthClient.isAuthenticated()) { window.location.href = '/'; return; }

            function showAlert(msg, type) { alertEl.textContent = msg; alertEl.className = 'alert ' + type; }
            function setLoading(l) { submitBtn.disabled = l; submitBtn.classList.toggle('loading', l); }

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                showAlert('', '');
                resetLinkBox.classList.remove('visible');
                const email = emailInput.value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showAlert('Please enter a valid email address.', 'error');
                    return;
                }
                setLoading(true);
                try {
                    const data = await AuthClient.forgotPassword(email);
                    showAlert(data.message || 'Check your email for the reset link.', 'success');
                    // In demo mode, show the reset link directly
                    if (data._debug_reset_link) {
                        resetLink.href = data._debug_reset_link;
                        resetLink.textContent = data._debug_reset_link;
                        resetLinkBox.classList.add('visible');
                    }
                } catch (err) {
                    showAlert(err.message || 'Something went wrong.', 'error');
                }
                setLoading(false);
            });
        })();
    </script>
</body>
</html>
