<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Section Layout</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <style>
        .section {
            height: 1080px;
            width: 100% ;
            background-color: #ffffff;
            border: 1px solid #ddd;
            padding: 20px;
            display: inline-block;
        }
        .section2 {
            height: 1080px;
            width: 100% ;
            background-color: #ffffff;
            border: 1px solid #ddd;
            padding: 20px;
            display: inline-block;
        }
        .logo-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="section"></div>
                <div class="section2" id="section2"></div>
                <div class="section"></div>
            </div>
        </div>
        <div class="logo-container">
            <img src="img/logo-01.png" alt="Logo" width="210" height="210">
            <br>
            <a href="#section2" class="scroll-to-section"><img src="img/arrow.png" alt="Scroll Down" style="height: 12px; width: 27px; margin-bottom: 60px;"></a>
        </div>
    </div>

    <script>
        document.querySelector('.scroll-to-section').addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelector('#section2').scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
