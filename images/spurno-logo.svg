<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 260" width="780" height="260" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">SPurno Animation Studio</title>
  <desc id="logoDesc">A geometric S monogram built from two precision circular arcs, with a subtle offset ghost frame — referencing animation's onion-skinning technique.</desc>

  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB84D"/>
      <stop offset="60%" stop-color="#f7931e"/>
      <stop offset="100%" stop-color="#e67e00"/>
    </linearGradient>

    <linearGradient id="ghost" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD79C"/>
      <stop offset="100%" stop-color="#FFB84D"/>
    </linearGradient>
  </defs>

  <g transform="translate(35, 60)">

    <path d="M 0,30 A 55,55 0 0,1 90,68 A 55,55 0 0,1 0,106"
          fill="none"
          stroke="url(#ghost)"
          stroke-width="24"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.07"
          transform="translate(12, -6)"/>

    <path d="M 0,30 A 55,55 0 0,1 90,68 A 55,55 0 0,1 0,106"
          fill="none"
          stroke="url(#ghost)"
          stroke-width="24"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.18"
          transform="translate(6, -3)"/>

    <path d="M 0,30 A 55,55 0 0,1 90,68 A 55,55 0 0,1 0,106"
          fill="none"
          stroke="url(#primary)"
          stroke-width="24"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <text x="194" y="143"
        font-family="'Montserrat','Inter','Segoe UI',Arial,sans-serif"
        font-size="86"
        font-weight="900"
        fill="#f7931e"
        letter-spacing="-2.5"
        style="font-variant-numeric: lining-nums;">SP</text>

  <text x="352" y="146"
        font-family="'Montserrat','Inter','Segoe UI',Arial,sans-serif"
        font-size="72"
        font-weight="250"
        fill="#f7931e"
        letter-spacing="0.5">urno</text>

  <text x="196" y="200"
        font-family="'Montserrat','Inter','Segoe UI',Arial,sans-serif"
        font-size="13"
        font-weight="600"
        fill="#a8846a"
        letter-spacing="11">ANIMATION STUDIO</text>

</svg>
