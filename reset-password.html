<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set New Password | SPurno Animation Studio</title>
    <meta name="description" content="Set a new password for your SPurno account.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://spurno.github.io/reset-password">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="stylesheet" href="assets/css/reset-password.css">
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="auth-logo">
            <img src="images/spurno-logo.png" alt="SPurno Animation Studio" width="3893" height="1099" loading="lazy" title="SPurno Animation Studio - Set New Password">
            <span>SPurno</span>
        </a>
        <div class="auth-card">
            <h1 class="auth-title">Set New <span>Password</span></h1>
            <p class="auth-subtitle">Enter your new password below.</p>
            <div class="alert" id="alertMessage" role="alert"></div>
            <form id="resetForm" novalidate>
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
                    <div class="password-strength" id="passwordStrength">
                        <div class="bar" data-index="0"></div>
                        <div class="bar" data-index="1"></div>
                        <div class="bar" data-index="2"></div>
                        <div class="bar" data-index="3"></div>
                    </div>
                    <div class="field-error" id="passwordError">Password must be at least 6 characters.</div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your new password" required autocomplete="new-password">
                    <div class="field-error" id="confirmError">Passwords do not match.</div>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text">Reset Password</span>
                    <span class="spinner"></span>
                </button>
            </form>
            <div class="auth-footer">
                <a href="login.html">Back to Sign In</a>
            </div>
        </div>
        <div class="auth-footer" style="margin-top: 20px;">
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>
    <script src="js/auth-client.js"></script>
    <script>
        (function() {
            // Get token from URL
            const params = new URLSearchParams(window.location.search);
            const resetToken = params.get('token');

            const form = document.getElementById('resetForm');
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            const submitBtn = document.getElementById('submitBtn');
            const alertEl = document.getElementById('alertMessage');
            const passwordError = document.getElementById('passwordError');
            const confirmError = document.getElementById('confirmError');
            const strengthBars = document.querySelectorAll('#passwordStrength .bar');

            if (AuthClient.isAuthenticated()) { window.location.href = '/'; return; }

            if (!resetToken) {
                alertEl.textContent = 'No reset token found. Please request a new password reset link.';
                alertEl.className = 'alert error';
                submitBtn.disabled = true;
                return;
            }

            // Password strength
            passwordInput.addEventListener('input', function() {
                const val = this.value;
                let score = 0;
                if (val.length >= 6) score++;
                if (val.length >= 10) score++;
                if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
                if (/\d/.test(val) || /[^A-Za-z0-9]/.test(val)) score++;
                strengthBars.forEach((bar, i) => {
                    bar.classList.toggle('active', i < score);
                    bar.className = 'bar' + (i < score ? ' active' : '') + (score <= 1 ? ' weak' : score <= 2 ? ' medium' : ' strong');
                });
            });

            confirmInput.addEventListener('input', function() {
                if (this.value && this.value !== passwordInput.value) {
                    confirmError.classList.add('visible');
                } else {
                    confirmError.classList.remove('visible');
                }
            });

            function showAlert(msg, type) { alertEl.textContent = msg; alertEl.className = 'alert ' + type; }
            function setLoading(l) { submitBtn.disabled = l; submitBtn.classList.toggle('loading', l); }
            function clearErrors() {
                [passwordInput, confirmInput].forEach(el => el.classList.remove('error'));
                [passwordError, confirmError].forEach(el => el.classList.remove('visible'));
            }

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                clearErrors();
                showAlert('', '');
                let valid = true;

                const password = passwordInput.value;
                const confirm = confirmInput.value;

                if (password.length < 6) {
                    passwordInput.classList.add('error');
                    passwordError.classList.add('visible');
                    valid = false;
                }

                if (password !== confirm) {
                    confirmInput.classList.add('error');
                    confirmError.classList.add('visible');
                    valid = false;
                }

                if (!valid) return;
                setLoading(true);

                try {
                    await AuthClient.resetPassword(resetToken, password);
                    showAlert('Password reset successful! Redirecting to sign in...', 'success');
                    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
                } catch (err) {
                    showAlert(err.message || 'Failed to reset password.', 'error');
                    setLoading(false);
                }
            });
        })();
    </script>
</body>
</html>
