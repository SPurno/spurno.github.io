<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Option A - Liquid Glass</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a12; font-family: 'Jost', sans-serif; }
        canvas { display: block; }
        #info {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
            font-weight: 300;
            transition: opacity 0.8s ease;
        }
        #info span {
            display: inline-block;
            opacity: 0.6;
        }
        #tag-a {
            position: fixed;
            top: 30px;
            left: 30px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            #info { font-size: 10px; bottom: 25px; }
            #tag-a { top: 20px; left: 20px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="tag-a">Option A — Liquid Glass</div>
    <div id="info"><span>↔ drag to orbit · scroll to zoom</span></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene Setup ───────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 4.5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;
controls.minDistance = 2;
controls.maxDistance = 10;
controls.target.set(0, 0.2, 0);
controls.update();

// Pause auto-rotate on interaction, resume after 4s idle
let idleTimer = null;
controls.addEventListener('start', () => {
    controls.autoRotate = false;
    if (idleTimer) clearTimeout(idleTimer);
});
controls.addEventListener('end', () => {
    if (idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(() => { controls.autoRotate = true; }, 4000);
});

// ─── Lighting ──────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x222244, 0.5);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0x8888ff, 2.0);
keyLight.position.set(3, 4, 5);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xff4488, 1.0);
fillLight.position.set(-3, 1, -2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x44ffff, 1.5);
rimLight.position.set(0, -2, -4);
scene.add(rimLight);

const pointLight = new THREE.PointLight(0xff66aa, 3, 8);
pointLight.position.set(0, 1.5, 0);
scene.add(pointLight);

// ─── The Liquid Glass Object ──────────────────────────────
// A morphing glass-like torus knot with chaotic vertices
const geo = new THREE.IcosahedronGeometry(1.2, 3);
const pos = geo.attributes.position;
const origPos = new Float32Array(pos.array);

// Store random offsets per vertex
const offsets = new Float32Array(pos.count);
const speeds = new Float32Array(pos.count);
const phases = new Float32Array(pos.count);
for (let i = 0; i < pos.count; i++) {
    offsets[i] = 0.15 + Math.random() * 0.45;
    speeds[i] = 0.3 + Math.random() * 0.7;
    phases[i] = Math.random() * Math.PI * 2;
}

const mat = new THREE.MeshPhysicalMaterial({
    color: 0x88bbff,
    metalness: 0.1,
    roughness: 0.05,
    transparent: true,
    opacity: 0.92,
    envMapIntensity: 2.0,
    clearcoat: 0.8,
    clearcoatRoughness: 0.2,
    ior: 1.6,
    reflectivity: 0.9,
    wireframe: false,
    side: THREE.DoubleSide,
});
const mesh = new THREE.Mesh(geo, mat);
mesh.position.y = 0.2;
scene.add(mesh);

// ─── Wireframe overlay ────────────────────────────────────
const wireMat = new THREE.MeshBasicMaterial({
    color: 0x88ddff,
    wireframe: true,
    transparent: true,
    opacity: 0.08,
});
const wireMesh = new THREE.Mesh(geo.clone(), wireMat);
wireMesh.position.y = 0.2;
scene.add(wireMesh);

// ─── Inner glow sphere ────────────────────────────────────
const glowGeo = new THREE.SphereGeometry(0.6, 24, 24);
const glowMat = new THREE.MeshBasicMaterial({
    color: 0x4488ff,
    transparent: true,
    opacity: 0.15,
});
const glowMesh = new THREE.Mesh(glowGeo, glowMat);
glowMesh.position.y = 0.2;
scene.add(glowMesh);

// ─── Floating particles ───────────────────────────────────
const particleCount = 800;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
const pSizes = new Float32Array(particleCount);
const pOffsets = new Float32Array(particleCount);
const pSpeeds = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 1.8 + Math.random() * 2.5;
    pPos[i*3] = Math.sin(phi) * Math.cos(theta) * r;
    pPos[i*3+1] = Math.sin(phi) * Math.sin(theta) * r * 0.6 + 0.2;
    pPos[i*3+2] = Math.cos(phi) * r;
    pSizes[i] = 0.008 + Math.random() * 0.025;
    pOffsets[i] = Math.random() * Math.PI * 2;
    pSpeeds[i] = 0.1 + Math.random() * 0.3;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));

const pMat = new THREE.PointsMaterial({
    color: 0x88ccff,
    size: 0.02,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
});
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

// ─── Light orbs ────────────────────────────────────────────
const orbGroup = new THREE.Group();
const orbCount = 6;
for (let i = 0; i < orbCount; i++) {
    const orbGeo = new THREE.SphereGeometry(0.04, 8, 8);
    const orbMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(i / orbCount, 0.8, 0.6),
        transparent: true,
        opacity: 0.8,
    });
    const orb = new THREE.Mesh(orbGeo, orbMat);
    const angle = (i / orbCount) * Math.PI * 2;
    const radius = 1.5;
    orb.position.set(Math.cos(angle) * radius, 0.2 + Math.sin(angle * 2) * 0.3, Math.sin(angle) * radius);
    orb.userData = { angle, radius, speed: 0.4 + Math.random() * 0.3, yOff: 0.3 };
    orbGroup.add(orb);
}
scene.add(orbGroup);

// ─── Animation loop ────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const t = clock.getElapsedTime();

    // Morph the glass shape
    const p = geo.attributes.position;
    const arr = p.array;
    for (let i = 0; i < arr.length; i += 3) {
        const vi = i / 3;
        const ox = origPos[vi*3];
        const oy = origPos[vi*3+1];
        const oz = origPos[vi*3+2];
        const off = offsets[vi];
        const spd = speeds[vi];
        const ph = phases[vi];
        const wave = Math.sin(t * spd + ph) * off;
        const wave2 = Math.cos(t * spd * 0.6 + ph * 1.3) * off * 0.4;
        // Directional displacement along normal-ish direction
        const len = Math.sqrt(ox*ox + oy*oy + oz*oz) || 1;
        arr[i]   = ox + (ox/len) * (wave + wave2);
        arr[i+1] = oy + (oy/len) * (wave * 0.8 + wave2 * 0.6);
        arr[i+2] = oz + (oz/len) * (wave * 0.9 + wave2 * 0.7);
    }
    p.needsUpdate = true;
    geo.computeVertexNormals();

    // Update wireframe mesh geometry (copy position data, no new allocation)
    const wirePos = wireMesh.geometry.attributes.position;
    if (wirePos) {
        wirePos.array.set(arr);
        wirePos.needsUpdate = true;
    }

    // Pulse glow
    const glowPulse = 0.12 + Math.sin(t * 0.8) * 0.06;
    glowMat.opacity = glowPulse;
    pointLight.intensity = 2.5 + Math.sin(t * 0.7) * 1.0;

    // Animate particles - slow orbit
    const pp = particles.geometry.attributes.position;
    for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;
        const theta = (i / particleCount) * Math.PI * 2 + t * pSpeeds[i] * 0.15;
        const r = 1.8 + Math.sin(t * pSpeeds[i] * 0.3 + pOffsets[i]) * 0.5;
        pp.array[idx] = Math.cos(theta + pOffsets[i] * 0.5) * r;
        pp.array[idx+2] = Math.sin(theta + pOffsets[i] * 0.5) * r;
    }
    pp.needsUpdate = true;

    // Animate orbiting light orbs
    orbGroup.children.forEach((orb, i) => {
        const { angle, radius, speed, yOff } = orb.userData;
        const a = angle + t * speed * 0.2;
        orb.position.x = Math.cos(a) * (radius + Math.sin(t * 0.5 + i) * 0.2);
        orb.position.z = Math.sin(a) * (radius + Math.cos(t * 0.4 + i * 1.2) * 0.2);
        orb.position.y = 0.2 + Math.sin(t * speed * 0.5 + i) * yOff;
        const hue = ((i / orbCount) + Math.sin(t * 0.1) * 0.1) % 1;
        orb.material.color.setHSL(hue, 0.8, 0.6);
    });

    // Subtle mesh rotation (separate from orbit controls)
    mesh.rotation.y = t * 0.08;
    mesh.rotation.x = Math.sin(t * 0.05) * 0.05;
    wireMesh.rotation.copy(mesh.rotation);
    glowMesh.rotation.copy(mesh.rotation);

    controls.update();
    renderer.render(scene, camera);
}

animate();

// ─── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
    </script>
</body>
</html>
